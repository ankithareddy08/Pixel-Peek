<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Pixelpeek</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/index.css" />
</head>
<body>
  <main class="launcher">
    <section class="launcher-panel">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
        </div>
        <div>
          <p class="eyebrow">Pixelpeek</p>
          <h1>Select a role</h1>
        </div>
      </div>

      <div class="role-grid">
        <a class="role-card" href="/host#connect">
          <span class="role-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="12" rx="2"></rect>
              <path d="M8 20h8"></path>
              <path d="M12 16v4"></path>
            </svg>
          </span>
          <strong>Host</strong>
          <span>Create a run code, show the QR, push URLs, and capture devices.</span>
        </a>
        <a class="role-card" href="/client">
          <span class="role-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="5" y="2" width="14" height="20" rx="2"></rect>
              <path d="M12 18h.01"></path>
            </svg>
          </span>
          <strong>Client</strong>
          <span>Join a host run by entering the code or scanning the QR on a phone.</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
